<!doctype html>
<html>
  <head>
    <title>Acquisition Edge</title>
    <style>
      body {
        width: 450px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #0f172a; /* slate-900 */
        color: #f1f5f9; /* slate-100 */
      }
      .header {
        background-color: #0f172a; /* slate-900 */
        padding: 16px;
        border-bottom: 2px solid #334155; /* slate-700 */
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #ffffff;
      }
      .header h1 span {
          color: #fbbf24; /* amber-400 */
          font-style: italic;
      }
      .tabs {
        display: flex;
        background: #1e293b; /* slate-800 */
        border-bottom: 1px solid #334155;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px 8px;
        cursor: pointer;
        font-size: 13px;
        color: #94a3b8;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }
      .tab.active {
        border-bottom-color: #fbbf24; /* amber-400 */
        color: #ffffff;
        font-weight: 600;
      }
      .tab:hover {
        background: #334155;
      }
      .content {
        padding: 16px;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin-bottom: 10px;
        border: none;
        border-radius: 6px;
        background-color: #fbbf24; /* amber-400 */
        color: #0f172a;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }
      .btn:hover {
        background-color: #f59e0b; /* amber-500 */
      }
      .btn-secondary {
        background-color: #334155; /* slate-700 */
        color: #f1f5f9;
        font-weight: 600;
      }
      .btn-secondary:hover {
        background-color: #475569; /* slate-600 */
      }
      .form-group {
        margin-bottom: 12px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        margin-bottom: 4px;
        color: #94a3b8;
      }
      .form-group input {
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #334155;
        background-color: #0f172a;
        color: white;
        box-sizing: border-box;
      }
      #deal-data-container {
        display: flex;
        gap: 16px;
        margin-top: 16px;
      }
      .deal-data-left {
        flex: 1;
      }
      .deal-data-right {
        flex: 1;
      }
      .deal-info {
        background: #1e293b;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-size: 12px;
      }
      .deal-info div {
        margin-bottom: 4px;
      }
      .deal-info strong {
        color: #94a3b8;
      }
      .crm-section {
        margin-bottom: 16px;
      }
      .crm-section h3 {
        font-size: 12px;
        text-transform: uppercase;
        color: #94a3b8;
        margin-bottom: 8px;
        border-bottom: 1px solid #334155;
        padding-bottom: 4px;
      }
      .checkbox-group {
        display: flex;
        align-items: center;
        margin-bottom: 6px;
        font-size: 13px;
      }
      .checkbox-group input {
        margin-right: 8px;
      }
      .queue-item {
        background: #1e293b;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 8px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .badge {
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 10px;
        background: #334155;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Acquisition <span>Edge</span></h1>
      <span id="status-indicator" style="font-size: 10px; color: #94a3b8"
        >Ready</span
      >
    </div>

    <div class="tabs">
      <div class="tab active" data-target="panel-current">Current Deal</div>
      <div class="tab" data-target="panel-queue">
        Queue (<span id="queue-count">0</span>)
      </div>
      <div class="tab" data-target="panel-settings">Settings</div>
    </div>

    <div class="content">
      <!-- Current Deal Panel -->
      <div id="panel-current" class="panel active">
        <button id="btn-scrape" class="btn">Scrape Listing Data</button>
        <button id="btn-autofill" class="btn btn-secondary">
          Auto-Fill Contact Form
        </button>

        <div id="deal-data-container" style="display: none">
          <div class="deal-data-left">
            <div class="deal-info" id="deal-info-display">
              <!-- Populated via JS -->
            </div>
          </div>
          <div class="deal-data-right">
            <div class="crm-section">
              <h3>Prep & Docs</h3>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-nda" /><label for="crm-nda"
                  >NDA Signed</label
                >
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-fin-req" /><label for="crm-fin-req"
                  >Financials Requested</label
                >
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-pof" /><label for="crm-pof"
                  >POF Sent</label
                >
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-cim" /><label for="crm-cim"
                  >CIM/Financials Received</label
                >
              </div>
            </div>

            <div class="crm-section">
              <h3>Action & Comms</h3>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-broker-call" /><label
                  for="crm-broker-call"
                  >Broker Call</label
                >
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-seller-call" /><label
                  for="crm-seller-call"
                  >Seller Call</label
                >
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-offer" /><label for="crm-offer"
                  >Offer Made</label
                >
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-loi" /><label for="crm-loi"
                  >LOI Sent</label
                >
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="crm-dd" /><label for="crm-dd"
                  >Due Diligence</label
                >
              </div>
            </div>

            <button id="btn-save-deal" class="btn" style="margin-bottom: 16px">
              Save to Queue
            </button>
          </div>
        </div>
      </div>

      <!-- Queue Panel -->
      <div id="panel-queue" class="panel">
        <button id="btn-send-batch" class="btn" style="margin-bottom: 8px">
          Send Batch to Acquisition Edge
        </button>
        <button id="btn-clear-queue" class="btn btn-secondary" style="margin-bottom: 16px; border-color: #ef4444; color: #ef4444;">
          Clear Data
        </button>
        <div
          id="batch-status"
          style="
            font-size: 12px;
            color: #10b981;
            margin-bottom: 16px;
            display: none;
          "
        >
          Batch sent successfully!
        </div>
        <div id="queue-list">
          <!-- Populated via JS -->
        </div>
      </div>

      <!-- Settings Panel -->
      <div id="panel-settings" class="panel">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="set-name" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="set-phone" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="text" id="set-email" />
        </div>
        <div class="form-group">
          <label>Zip Code</label>
          <input type="text" id="set-zip" />
        </div>
        <div class="form-group">
          <label>Acquisition Edge App URL (for API)</label>
          <input
            type="text"
            id="set-api-url"
            placeholder="https://dealscout.it.com"
          />
        </div>
        <button id="btn-save-settings" class="btn">Save Settings</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
