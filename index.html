<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acquisition Edge | Contrarian Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      window.process = window.process || { env: {} };
      window.process.env = window.process.env || {};
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: {
                300: '#F8F5EF', // Mapping old text colors to new white
                400: '#8A9BB5', // Scout Slate
                500: '#8A9BB5',
                600: 'rgba(201,153,58,0.25)', // Rule
                700: '#252933', // ink3
                800: '#1A1D24', // Vault (ink2)
                850: '#1A1D24',
                900: '#0D0F12', // Obsidian (ink)
                950: '#0D0F12',
              },
              amber: {
                300: '#E8C06A', // gold-light
                400: '#C9993A', // Signal Gold
                500: '#C9993A',
              },
              cyan: {
                300: '#E8C06A', // Mapping cyan to gold-light
                400: '#C9993A', // Mapping cyan to gold
                500: '#C9993A',
                600: '#C9993A',
              },
              emerald: {
                400: '#C9993A', // Mapping emerald to gold
                500: '#C9993A',
                600: '#C9993A',
                900: '#1A1D24',
              }
            },
            fontFamily: {
              sans: ['"DM Sans"', 'sans-serif'],
              display: ['"DM Serif Display"', 'serif'],
              mono: ['"Space Mono"', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0D0F12;
        color: #F8F5EF;
      }
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1A1D24; 
      }
      ::-webkit-scrollbar-thumb {
        background: #252933; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #C9993A; 
      }

      /* Print Styles for High Quality PDF */
      @media print {
        body {
          background-color: white !important;
          color: black !important;
        }
        #root {
          display: none !important;
        }
        #print-root {
          display: block !important;
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          margin: 0;
          padding: 0;
        }
        @page {
          margin: 1.5cm;
          size: auto;
        }
        /* Ensure background graphics (colors/borders) are printed */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      }

      /* Hide print root on screen */
      #print-root {
        display: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "react-dom": "https://esm.sh/react-dom@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <div id="print-root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
